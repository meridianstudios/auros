name: release

# Push a version tag (git tag vX.Y.Z && git push origin vX.Y.Z) to build the
# desktop installers + Android APK and attach them to ONE draft GitHub Release
# for review. A create-release job makes the draft first; every build job then
# uploads to it by ID. This avoids the matrix race that otherwise creates
# duplicate drafts — GitHub's "get release by tag" ignores drafts, so without a
# shared release each tauri-action leg would create its own.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1) Create (or reuse, on a re-run) the single draft release up front.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.mk.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: mk
        env:
          TAG: ${{ github.ref_name }}
        with:
          result-encoding: string
          script: |
            const tag = process.env.TAG;
            const { owner, repo } = context.repo;
            const all = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            let rel = all.data.find((r) => r.tag_name === tag);
            if (!rel) {
              rel = (await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: `Auros ${tag}`,
                body: 'Auros — severe-weather awareness by Meridian.',
                draft: true,
                prerelease: false,
              })).data;
            }
            return String(rel.id);

  # 2) Desktop: macOS (per-arch .dmg), Linux (AppImage/deb/rpm), Windows (NSIS/MSI)
  desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm install --no-audit --no-fund # not `npm ci`: dodges npm's optional-dep bug (#4828) that drops platform-native binaries like @tauri-apps/cli-darwin-arm64
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the bundle at build time — add as repo Actions secrets.
          VITE_FB_API_KEY: ${{ secrets.VITE_FB_API_KEY }}
          VITE_FB_AUTH_DOMAIN: ${{ secrets.VITE_FB_AUTH_DOMAIN }}
          VITE_FB_PROJECT_ID: ${{ secrets.VITE_FB_PROJECT_ID }}
          VITE_FB_STORAGE_BUCKET: ${{ secrets.VITE_FB_STORAGE_BUCKET }}
          VITE_FB_SENDER_ID: ${{ secrets.VITE_FB_SENDER_ID }}
          VITE_FB_APP_ID: ${{ secrets.VITE_FB_APP_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }} # upload to the shared draft, don't create one
          args: ${{ matrix.args }}

  # 3) Android APK via Capacitor, uploaded to the same draft release.
  android:
    needs: [create-release, desktop] # build after desktop, attach to the shared draft
    if: ${{ !cancelled() }} # still build even if a desktop leg flakes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm install --no-audit --no-fund # not `npm ci`: dodges npm's optional-dep bug (#4828)
      - name: Build web app
        env:
          VITE_FB_API_KEY: ${{ secrets.VITE_FB_API_KEY }}
          VITE_FB_AUTH_DOMAIN: ${{ secrets.VITE_FB_AUTH_DOMAIN }}
          VITE_FB_PROJECT_ID: ${{ secrets.VITE_FB_PROJECT_ID }}
          VITE_FB_STORAGE_BUCKET: ${{ secrets.VITE_FB_STORAGE_BUCKET }}
          VITE_FB_SENDER_ID: ${{ secrets.VITE_FB_SENDER_ID }}
          VITE_FB_APP_ID: ${{ secrets.VITE_FB_APP_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        run: npm run build
      - name: Add Android platform
        run: npx cap add android
      - name: Brand the launcher icon
        continue-on-error: true
        run: |
          mkdir -p resources
          cp src-tauri/icons/icon.png resources/icon.png
          npx capacitor-assets generate --android
      - name: Sync web build into Android
        run: npx cap sync android
      - name: Use a consistent debug signing key
        run: |
          mkdir -p ~/.android
          cp ci/debug.keystore ~/.android/debug.keystore
      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk auros.apk
      - name: Attach APK to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" auros.apk --clobber
