name: release

# Build every platform and attach the installers to the GitHub Release whenever
# a release is published (or run manually). Create a release tagged e.g. v1.0.0
# (gh release create v1.0.0 ...) and this fans out the builds.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # tauri-action / gh-release upload assets to the release

jobs:
  # ---- Desktop: macOS (universal), Linux (AppImage/deb), Windows (NSIS/MSI) ----
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the bundle at build time — add these as repo Actions secrets.
          VITE_FB_API_KEY: ${{ secrets.VITE_FB_API_KEY }}
          VITE_FB_AUTH_DOMAIN: ${{ secrets.VITE_FB_AUTH_DOMAIN }}
          VITE_FB_PROJECT_ID: ${{ secrets.VITE_FB_PROJECT_ID }}
          VITE_FB_STORAGE_BUCKET: ${{ secrets.VITE_FB_STORAGE_BUCKET }}
          VITE_FB_SENDER_ID: ${{ secrets.VITE_FB_SENDER_ID }}
          VITE_FB_APP_ID: ${{ secrets.VITE_FB_APP_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.event.release.tag_name || github.ref_name }}
          releaseName: 'Auros ${{ github.event.release.tag_name || github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ---- Android APK (sideload) ----
  # Needs the keystore secrets below. If they're absent the build still produces
  # an unsigned APK (debug-installable); add them for a signed release APK.
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android'
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm ci
      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
          VITE_FB_API_KEY: ${{ secrets.VITE_FB_API_KEY }}
          VITE_FB_AUTH_DOMAIN: ${{ secrets.VITE_FB_AUTH_DOMAIN }}
          VITE_FB_PROJECT_ID: ${{ secrets.VITE_FB_PROJECT_ID }}
          VITE_FB_STORAGE_BUCKET: ${{ secrets.VITE_FB_STORAGE_BUCKET }}
          VITE_FB_SENDER_ID: ${{ secrets.VITE_FB_SENDER_ID }}
          VITE_FB_APP_ID: ${{ secrets.VITE_FB_APP_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        run: |
          npm run tauri android init -- --ci
          npm run tauri android build -- --apk
      - name: Sign APK (if keystore provided)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/auros.jks"
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk/universal/release"
          UNSIGNED=$(ls "$APK_DIR"/*-unsigned.apk | head -1)
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)"
          "$BUILD_TOOLS/zipalign" -f 4 "$UNSIGNED" "$APK_DIR/auros-release.apk"
          "$BUILD_TOOLS/apksigner" sign --ks "$RUNNER_TEMP/auros.jks" --ks-pass "env:KS_PASS" \
            --ks-key-alias "$KEY_ALIAS" --key-pass "env:KEY_PASS" "$APK_DIR/auros-release.apk"
      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
